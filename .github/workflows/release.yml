name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Package Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare artifact directory
        run: |
          cp -r out release-artifact

      - name: Create start instructions
        run: |
          cat > release-artifact/START_HERE.md << 'EOF'
          # SCXML Visual Editor

          This is a static build. Serve the files with any web server:

          ```bash
          # Python (no install needed)
          python3 -m http.server 3000

          # Node.js (npx)
          npx serve .
          ```

          Or deploy the folder contents to any static host (Netlify, S3, GitHub Pages, nginx).
          EOF

      - name: Create versioned zip archive
        run: |
          cd release-artifact
          zip -r "../scxml-editor-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "SCXML Visual Editor ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            Download `scxml-editor-${{ steps.version.outputs.VERSION }}.zip` below.

            **Serve it locally:**
            ```bash
            unzip scxml-editor-${{ steps.version.outputs.VERSION }}.zip
            python3 -m http.server 3000
            ```
            Or deploy the folder to any static host (Netlify, S3, GitHub Pages, nginx).
          files: |
            scxml-editor-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
